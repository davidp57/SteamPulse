# SteamPulse — Docker Compose deployment
#
# Two ways to configure credentials (pick one):
#
# A) Environment variables (simple Steam-only setup)
#    1. cp .env.example .env  and fill in STEAM_API_KEY + STEAM_ID
#    2. docker compose up -d
#
# B) Mounted config file (recommended for Epic / Twitch)
#    1. Run  steam-setup  on a machine with SteamPulse installed; the wizard
#       writes a config.toml (path shown at the end of the wizard).
#    2. Copy that file next to this docker-compose.yml:
#           cp ~/.config/steampulse/config.toml ./config.toml
#    3. Uncomment the config volume line below.
#    4. docker compose up -d
#    When a config file is mounted, env var credentials are ignored.
#
# Synology NAS: upload files via File Station, then use Container Manager
# or SSH + "docker compose up -d" from the directory containing this file.

services:
  steampulse:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # Alternatively, use the pre-built image from GHCR (no local build needed):
    # image: ghcr.io/davidp57/steampulse:latest
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      - steampulse_data:/data
      # Option B: mount a config.toml generated by steam-setup
      # (covers Steam + Epic + Twitch + all settings in one file)
      # - ./config.toml:/config/config.toml:ro
    env_file: .env
    restart: unless-stopped

volumes:
  steampulse_data:
