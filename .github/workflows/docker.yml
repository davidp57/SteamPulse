name: Docker

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - "pyproject.toml"
      - "steam_tracker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test (PR only)
        if: github.event_name == 'pull_request'
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          # nginx config is valid
          docker run --rm --entrypoint nginx "$IMAGE" -t
          # steampulse is installed and importable
          docker run --rm --entrypoint python "$IMAGE" -c "import steam_tracker; print('steam_tracker', steam_tracker.__version__)"
          # entrypoint script is syntactically correct
          docker run --rm --entrypoint bash "$IMAGE" -n /entrypoint.sh
          docker run --rm --entrypoint bash "$IMAGE" -n /scheduler.sh
