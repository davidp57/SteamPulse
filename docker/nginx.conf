server {
    listen 80 default_server;
    root /data;
    index steam_library.html;

    # Proxy API and auth routes to the steam-serve sidecar (127.0.0.1:8081).
    # proxy_buffering off is required for the SSE stream on /api/refetch.
    location /api/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host $host;
        proxy_read_timeout 600s;
        proxy_buffering    off;
    }

    location = /login {
        proxy_pass       http://127.0.0.1:8081;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Block direct access to the SQLite database
    location ~* \.db(\.bak)?$ {
        deny all;
        return 404;
    }

    # Block TOML config files if one ever ends up in /data (defense-in-depth)
    location ~* \.toml$ {
        deny all;
        return 404;
    }
}
